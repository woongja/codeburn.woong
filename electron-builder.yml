appId: com.codeburn.monitor
productName: CodeBurn Monitor
directories:
  output: release
files:
  - dist/**/*
  - resources/**/*
  - package.json
# Disable code signing (no cert, no signtool download)
forceCodeSigning: false
win:
  # Use 'dir' for a simple unpacked folder (no code signing needed),
  # or 'portable' for a single .exe.
  target:
    - target: dir
      arch: x64
  icon: resources/icon.png
  signAndEditExecutable: false
